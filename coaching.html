<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Coaching — Keegan Hansen-Davis</title>
    <meta name="description" content="90 days of 1:1 coaching with Keegan Hansen-Davis.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ffffff'/><text x='50' y='65' font-family='Georgia,serif' font-size='22' font-weight='700' fill='%231a1917' text-anchor='middle'>KHD</text></svg>">

    <link rel="stylesheet" href="styles.css">
    <style>
        .offer-block {
            margin-bottom: 64px;
        }

        .offer-title {
            font-size: 28px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .offer-body {
            margin-bottom: 32px;
        }

        .offer-body p {
            margin-bottom: 16px;
            color: var(--text);
        }

        .offer-price {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .cta-button {
            display: inline-block;
            background: var(--text);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.03em;
            padding: 14px 28px;
            text-decoration: none;
            transition: opacity 0.15s ease;
        }

        .cta-button:hover {
            color: #ffffff;
            opacity: 0.75;
        }

        .fine-print {
            margin-top: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            color: var(--text-dim);
        }

        .divider {
            border: none;

            margin: 48px 0;
        }

        .what-this-is {
            margin-bottom: 48px;
        }

</head>
<body>
    <main>
        <div class="page">

            </header>

            <section class="offer-block">
                <h1 class="offer-title">Meta Coaching</h1>

                <div class="offer-body">
                    <p>90 days. One conversation at a time.</p>
                </div>

                <p class="offer-price">$5,000 / quarter</p>

                <a href="https://buy.stripe.com/bJe28k5oOeaA5DN5EecV200" class="cta-button">
                    Get started
                </a>

                <p class="fine-print">
                    At the end of 90 days, we both decide if we continue.
                </p>
            </section>


        </div>
    </main>
